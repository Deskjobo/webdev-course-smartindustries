<!DOCTYPE html>
<!-- Indica que el documento utiliza HTML5 -->

<html lang="es">
  <!-- Elemento raíz del documento. El atributo lang especifica que el idioma es español -->

  <head>
    <!-- Sección de metadatos y configuración del documento -->

    <meta charset="UTF-8">
    <!-- Define la codificación de caracteres UTF-8 -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Permite una correcta visualización en dispositivos móviles -->
  </head>

  <body>
    <!-- Contenido visible de la página web -->

    <h1>Esto es un elemento</h1>
    <!-- Encabezado principal de la página -->

    <p>
      <!-- Párrafo de texto -->
      Este es un elemento de párrafo, que te lleva a otro lugar

      <a href="https://www.firefox.com/">
        como la página de Mozilla
      </a>
      <!-- Enlace que dirige al sitio web de Firefox -->
    </p>

    <img
      src="https://images.unsplash.com/photo-1462332420958-a05d1e002413"
      alt="Galaxia brillante vista desde cerca en el espacio">
    <!-- Imagen cargada desde una URL externa -->
    <!-- El atributo alt proporciona una descripción alternativa de la imagen -->

  </body>

</html>
<!-- Fin del documento HTML -->
